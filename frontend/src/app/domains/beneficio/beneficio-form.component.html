<div class="page">
  <div class="page-header">
    <h1>{{ isEdit() ? 'Editar' : 'Novo' }} Benefício</h1>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="form-group">
        <label for="nome">Nome</label>
        <input id="nome" formControlName="nome" type="text" placeholder="Nome do benefício" />
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <input id="descricao" formControlName="descricao" type="text" placeholder="Descrição" />
      </div>

      <div class="form-group">
        <label for="valor">Valor</label>
        <input id="valor" formControlName="valor" type="number" step="0.01" placeholder="0,00" />
      </div>

      <div class="checkbox-group">
        <input id="ativo" formControlName="ativo" type="checkbox" />
        <label for="ativo">Ativo</label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="router.navigate(['/beneficios'])">
          Cancelar
        </button>
        <button type="submit" class="btn-primary">
          Salvar
        </button>
      </div>

    </form>
  </div>
</div>
